services:
  - type: web
    name: medihub-backend
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npx prisma generate --schema prisma/schema.prisma
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      # Public URL of the deployed frontend — used to build links in emails
      # (password reset, welcome). MUST be set or reset links point to localhost.
      - key: FRONTEND_URL
        sync: false
      # Brevo (https://app.brevo.com) — primary mail provider, sent over HTTPS
      # so it works even when Google blocks SMTP logins from Render's IPs.
      # Free tier: 300 emails/day, no domain needed. Setup: verify
      # SMTP_FROM_EMAIL under Senders, create an API key, paste it here.
      # Gmail SMTP below stays as the automatic fallback.
      - key: BREVO_API_KEY
        sync: false
      # Gmail SMTP is fixed config, not a secret — pin it here so the only
      # dashboard-managed values are the account (SMTP_USER/SMTP_FROM_EMAIL)
      # and the app password (SMTP_PASS). 465 = implicit TLS, reliable on Render.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_FAMILY
        value: 4
      - key: SMTP_REQUIRE_TLS
        value: true
      - key: SMTP_DEBUG
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: MediHub
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: NEWS_API_KEY
        sync: false