services:
  - type: web
    name: medihub-backend
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npx prisma generate --schema prisma/schema.prisma
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        value: false
      - key: SMTP_FAMILY
        value: 4
      - key: SMTP_REQUIRE_TLS
        value: true
      - key: SMTP_DEBUG
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: MediHub
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: NEWS_API_KEY
        sync: false