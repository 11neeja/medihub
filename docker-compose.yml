services:
  postgres:
    image: postgres:16-alpine
    container_name: medihub-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: medihub
      POSTGRES_PASSWORD: medihub_secret
      POSTGRES_DB: medihub
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
